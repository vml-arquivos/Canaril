version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: canario-lima-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-canario}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-canario_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-canario_lima_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./drizzle/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - canario-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-canario} -d ${POSTGRES_DB:-canario_lima_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: canario-lima-app
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://canario:canario_local_password@postgres:5432/canario_lima_db}
      JWT_SECRET: ${JWT_SECRET:-troque-este-jwt-secret}
      SESSION_SECRET: ${SESSION_SECRET:-troque-este-session-secret}
      CSRF_SECRET: ${CSRF_SECRET:-troque-este-csrf-secret}
      OWNER_NAME: ${OWNER_NAME:-Canário Lima}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID:-canario-lima-admin}
      ADMIN_NAME: ${ADMIN_NAME:-Canário Lima}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123-trocar}
      VITE_APP_ID: ${VITE_APP_ID:-canario-gestao-pro-001}
      VITE_APP_TITLE: ${VITE_APP_TITLE:-Canário Gestão Pro}
      VITE_APP_LOGO: ${VITE_APP_LOGO:-/logo.png}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL:-}
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - canario-network
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  canario-network:
    driver: bridge
